# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core project to Azure Function App - dev-func-ecommerce

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './ECommerce.BackgroundFunctions'  
  DOTNET_VERSION: '10.0.x'  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Azure Function
        run: |
          dotnet publish \
            ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ECommerce.BackgroundFunctions.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/publish

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: dev-func-ecommerce
          slot-name: Production
          package: ${{ github.workspace }}/publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1EA3CF30F232446288435AA46E4C90DF }}
          sku: flexconsumption
